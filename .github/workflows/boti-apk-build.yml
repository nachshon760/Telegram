name: Boti APK Build
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Grant execute
        run: chmod +x ./gradlew || true
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Add Help subtitle to welcome screen
        run: |
          STRINGS_FILE=$(find . -type f -name "strings.xml" | grep -v "build/" | head -1)
          echo "Found strings file: $STRINGS_FILE"

          if [ -n "$STRINGS_FILE" ]; then
            if grep -q "Welcome to Telegram" "$STRINGS_FILE"; then
              sed -i 's|\(Welcome to Telegram\)</string>|\1</string>\n    <string name="WelcomeHelpSubtitle">עזרה</string>|' "$STRINGS_FILE"
              echo "Added WelcomeHelpSubtitle string to $STRINGS_FILE"
            fi
          fi
      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false -Xmx4g"
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: boti-debug-apk
          path: |
            **/build/outputs/apk/debug/*.apk
          if-no-files-found: warn