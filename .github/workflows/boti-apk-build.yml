name: Boti APK Build
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Grant execute
        run: chmod +x ./gradlew || true
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true
      - name: Install required SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" || true
      - name: Add Help subtitle to welcome screen
        run: |
          STRINGS_FILE=$(find . -type f -name "strings.xml" | grep -v "build/" | head -1)
          echo "Found strings file: $STRINGS_FILE"

          if [ -n "$STRINGS_FILE" ]; then
            if grep -q "Welcome to Telegram" "$STRINGS_FILE"; then
              sed -i 's|\(Welcome to Telegram\)</string>|\1</string>\n    <string name="WelcomeHelpSubtitle">עזרה</string>|' "$STRINGS_FILE"
              echo "Added WelcomeHelpSubtitle string to $STRINGS_FILE"
            fi
          fi
      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          cat local.properties
      - name: Set up gradle.properties
        run: |
          mkdir -p $HOME/.gradle
          cat >> $HOME/.gradle/gradle.properties << 'EOF'
          org.gradle.daemon=false
          org.gradle.parallel=false
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m
          android.useAndroidX=true
          android.enableJetifier=true
          EOF
      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon 2>&1 | tee build.log; exit ${PIPESTATUS[0]}
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false -Dorg.gradle.jvmargs=-Xmx4g"
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          APP_ID: "12345"
          APP_HASH: "0123456789abcdef0123456789abcdef"
          JAVA_TOOL_OPTIONS: "-Xmx4g"
      - name: Show build log on failure
        if: failure()
        run: |
          echo "=== BUILD LOG ==="
          cat build.log || true
          echo "=== GRADLE WRAPPER PROPERTIES ==="
          cat gradle/wrapper/gradle-wrapper.properties || true
          echo "=== BUILD.GRADLE ==="
          cat build.gradle || cat build.gradle.kts || true
          echo "=== APP BUILD.GRADLE ==="
          cat app/build.gradle || cat app/build.gradle.kts || true
          echo "=== SETTINGS.GRADLE ==="
          cat settings.gradle || cat settings.gradle.kts || true
      - name: List APK outputs
        if: always()
        run: find . -name "*.apk" 2>/dev/null || echo "No APKs found"
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: boti-debug-apk
          path: |
            **/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: ignore