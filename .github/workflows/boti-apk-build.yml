name: Boti APK Build
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Grant execute
        run: chmod +x ./gradlew || true
      - name: Add Help subtitle to welcome screen
        run: |
          INTRO_FILE=$(find . -type f -name "IntroActivity.java" | head -1)
          if [ -z "$INTRO_FILE" ]; then
            INTRO_FILE=$(find . -type f -name "IntroActivity.kt" | head -1)
          fi
          echo "Found intro file: $INTRO_FILE"

          if [ -n "$INTRO_FILE" ]; then
            if grep -q "Welcome to Telegram" "$INTRO_FILE"; then
              sed -i 's/Welcome to Telegram/Welcome to Telegram\n עזרה/' "$INTRO_FILE"
              echo "Patched Welcome to Telegram text in $INTRO_FILE"
            else
              echo "Welcome to Telegram string not found directly in $INTRO_FILE, trying strings.xml"
            fi
          fi

          STRINGS_FILE=$(find . -type f -name "strings.xml" | grep -v "build/" | head -1)
          echo "Found strings file: $STRINGS_FILE"

          if [ -n "$STRINGS_FILE" ]; then
            if grep -q "Welcome to Telegram" "$STRINGS_FILE"; then
              sed -i 's|\(Welcome to Telegram\)</string>|\1</string>\n    <string name="WelcomeHelpSubtitle">עזרה</string>|' "$STRINGS_FILE"
              echo "Added WelcomeHelpSubtitle string to $STRINGS_FILE"
            fi
          fi

          INTRO_LAYOUT=$(find . -type f -name "intro*.xml" | grep -v "build/" | head -1)
          echo "Found intro layout: $INTRO_LAYOUT"

          if [ -n "$INTRO_LAYOUT" ]; then
            if grep -q "welcome_title\|WelcomeTitle\|intro_title" "$INTRO_LAYOUT"; then
              sed -i 's|\(android:id="@+id/.*[Tt]itle.*"\)|android:id="@+id/welcome_subtitle"\n            android:layout_width="wrap_content"\n            android:layout_height="wrap_content"\n            android:text="עזרה"\n            android:textSize="16sp"\n            android:gravity="center" />\n        <TextView\n            \1|' "$INTRO_LAYOUT"
              echo "Patched intro layout: $INTRO_LAYOUT"
            fi
          fi
      - name: Build APK
        run: ./gradlew assembleDebug