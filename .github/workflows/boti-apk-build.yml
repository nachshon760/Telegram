name: Boti APK Build
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Grant execute
        run: chmod +x ./gradlew || true
      - name: Build APK
        run: ./gradlew assembleDebug
