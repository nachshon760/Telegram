name: Boti APK Build
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Grant execute
        run: chmod +x ./gradlew || true
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true
      - name: Install required SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" || true
      - name: Add Help subtitle to welcome screen
        run: |
          STRINGS_FILE=$(find . -type f -name "strings.xml" | grep -v "build/" | head -1)
          echo "Found strings file: $STRINGS_FILE"

          if [ -n "$STRINGS_FILE" ]; then
            if grep -q "Welcome to Telegram" "$STRINGS_FILE"; then
              sed -i 's|\(Welcome to Telegram\)</string>|\1</string>\n    <string name="WelcomeHelpSubtitle">עזרה</string>|' "$STRINGS_FILE"
              echo "Added WelcomeHelpSubtitle string to $STRINGS_FILE"
            fi
          fi
      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          cat local.properties
      - name: Set up gradle.properties
        run: |
          mkdir -p $HOME/.gradle
          cat >> $HOME/.gradle/gradle.properties << 'EOF'
          org.gradle.daemon=false
          org.gradle.parallel=false
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m
          android.useAndroidX=true
          android.enableJetifier=true
          EOF
      - name: Show project structure
        run: |
          echo "=== ROOT FILES ==="
          ls -la
          echo "=== GRADLE WRAPPER PROPERTIES ==="
          cat gradle/wrapper/gradle-wrapper.properties || true
          echo "=== BUILD.GRADLE ==="
          cat build.gradle || cat build.gradle.kts || true
          echo "=== APP BUILD.GRADLE ==="
          cat TMessagesProj/build.gradle || cat app/build.gradle || cat app/build.gradle.kts || true
          echo "=== SETTINGS.GRADLE ==="
          cat settings.gradle || cat settings.gradle.kts || true
      - name: Fix NDK version if needed
        run: |
          if [ -f "app/build.gradle" ]; then
            GRADLE_FILE="app/build.gradle"
          elif [ -f "TMessagesProj/build.gradle" ]; then
            GRADLE_FILE="TMessagesProj/build.gradle"
          else
            GRADLE_FILE=$(find . -name "build.gradle" | grep -v "^./build.gradle" | grep -v "build/" | head -1)
          fi
          echo "Using gradle file: $GRADLE_FILE"
          if [ -n "$GRADLE_FILE" ] && [ -f "$GRADLE_FILE" ]; then
            if grep -q "ndkVersion" "$GRADLE_FILE"; then
              NDK_VERSION=$(grep "ndkVersion" "$GRADLE_FILE" | head -1 | sed 's/.*ndkVersion[[:space:]]*["\x27]\([^"\x27]*\)["\x27].*/\1/')
              echo "Found NDK version: $NDK_VERSION"
              if [ -n "$NDK_VERSION" ]; then
                sdkmanager "ndk;$NDK_VERSION" || true
              fi
            fi
          fi
      - name: Install NDK
        run: |
          sdkmanager "ndk;21.4.7075529" || sdkmanager "ndk;23.1.7779620" || sdk